<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Teleradiology | Cloud CRM v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-badge { padding: 4px 10px; border-radius: 9999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-active { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-prospect { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-recruiting { background: rgba(236, 72, 153, 0.2); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.3); }
        .pipeline-col { min-height: 500px; background: rgba(15, 23, 42, 0.4); border-radius: 20px; border: 1px dashed rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Config Overlay -->
    <div id="setup-overlay" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center hidden">
        <div class="glass p-10 rounded-3xl max-w-lg w-full text-center space-y-6">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="database" class="text-white w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold">Connect Database</h2>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Supabase URL</label>
                    <input id="db-url" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 text-sm outline-none focus:border-indigo-500" placeholder="https://xyz.supabase.co">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Public API Key</label>
                    <input id="db-key" type="password" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 text-sm outline-none focus:border-indigo-500" placeholder="anon-public-key">
                </div>
                <button onclick="saveConfig()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all">Launch CRM</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-64 border-r border-slate-800 flex flex-col glass z-20">
        <div class="p-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center shadow-lg">
                    <i data-lucide="shield-plus" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight tracking-tight">APEX</h1>
                    <p class="text-[10px] text-slate-500 tracking-[0.2em] uppercase font-bold">Tele-CRM v3.0</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1 mt-4">
            <a href="#" onclick="showView('dashboard')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all" id="nav-dashboard">
                <i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-sm font-medium">Dashboard</span>
            </a>
            <a href="#" onclick="showView('directory')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all" id="nav-directory">
                <i data-lucide="users" class="w-5 h-5"></i><span class="text-sm font-medium">Provider Directory</span>
            </a>
            <a href="#" onclick="showView('pipeline')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all" id="nav-pipeline">
                <i data-lucide="trello" class="w-5 h-5"></i><span class="text-sm font-medium">Recruitment Pipeline</span>
            </a>
            <a href="#" onclick="showView('activity')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all" id="nav-activity">
                <i data-lucide="activity" class="w-5 h-5"></i><span class="text-sm font-medium">Activity Log</span>
            </a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <div id="sync-indicator" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-slate-900/50 text-[10px] text-slate-400 border border-slate-800">
                <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                <span>SYSTEM ONLINE</span>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0 bg-[#0a0f1d]">
        <header class="h-20 border-b border-slate-800 flex items-center justify-between px-10 glass shrink-0 relative z-10">
            <div class="relative w-[400px]">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                <input type="text" id="global-search" oninput="handleSearch(this.value)" placeholder="Search database..." class="w-full bg-slate-900/40 border border-slate-700/50 rounded-xl py-2.5 pl-12 pr-4 text-sm outline-none focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/5 transition-all">
            </div>
            <div class="flex items-center gap-4">
                <button onclick="exportToCSV()" class="p-2.5 bg-slate-800/50 border border-slate-700/50 rounded-xl text-slate-400 hover:text-white transition-all flex items-center gap-2 text-xs font-bold">
                    <i data-lucide="download" class="w-4 h-4"></i> EXPORT
                </button>
                <button onclick="refreshData()" class="p-2.5 bg-slate-800/50 border border-slate-700/50 rounded-xl text-slate-400 hover:text-white transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
                <button onclick="openModal('add')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg shadow-indigo-600/20">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> New Provider
                </button>
            </div>
        </header>
        <div id="content-view" class="flex-1 overflow-y-auto p-10 custom-scrollbar"></div>
    </main>

    <!-- Registration Modal -->
    <div id="modal" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center hidden">
        <div class="glass p-10 rounded-[2rem] max-w-2xl w-full space-y-8 border border-white/10 shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold tracking-tight" id="modal-title">Registration</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full"><i data-lucide="x" class="w-5 h-5 text-slate-500"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-1.5 col-span-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Full Name</label>
                    <input id="m-name" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Email Address</label>
                    <input id="m-email" type="email" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Phone Number</label>
                    <input id="m-phone" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Specialty</label>
                    <input id="m-specialty" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">NPI Number</label>
                    <input id="m-npi" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Base State</label>
                    <input id="m-state" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Initial Status</label>
                    <select id="m-status" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none appearance-none">
                        <option value="Prospect">Prospect</option>
                        <option value="Recruiting">Recruiting</option>
                        <option value="Pending">Pending</option>
                        <option value="Active">Active</option>
                    </select>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">License Number</label>
                    <input id="m-license" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">License Expiry</label>
                    <input id="m-expiry" type="date" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none">
                </div>
            </div>
            <div class="flex gap-4 pt-4">
                <button id="modal-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 transition-all">Complete Action</button>
            </div>
        </div>
    </div>

    <!-- Note Modal -->
    <div id="note-modal" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center hidden">
        <div class="glass p-10 rounded-[2rem] max-w-lg w-full space-y-6 border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-bold">Add Communication Entry</h2>
            <textarea id="note-content" rows="6" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none resize-none" placeholder="Type entry content here..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeNoteModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold transition-all">Cancel</button>
                <button id="note-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 transition-all">Save Entry</button>
            </div>
        </div>
    </div>

    <script>
        let supabase;
        let providers = [];
        let globalNotes = [];
        let config = JSON.parse(localStorage.getItem('apex_config')) || null;
        window.currentView = 'dashboard';

        async function init() {
            lucide.createIcons();
            if (!config) {
                document.getElementById('setup-overlay').classList.remove('hidden');
                return;
            }
            try {
                supabase = supabase.createClient(config.url, config.key);
                await refreshData();
            } catch (e) {
                console.error("Supabase Error:", e);
                alert("Failed to connect to Supabase. Check credentials.");
                localStorage.removeItem('apex_config');
                location.reload();
            }
        }

        function saveConfig() {
            const url = document.getElementById('db-url').value.trim();
            const key = document.getElementById('db-key').value.trim();
            if (!url || !key) return alert('Credentials required');
            config = { url, key };
            localStorage.setItem('apex_config', JSON.stringify(config));
            location.reload();
        }

        async function refreshData() {
            const sync = document.getElementById('sync-indicator');
            sync.innerHTML = '<div class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div><span>SYNCING...</span>';
            
            const { data: pData, error: pError } = await supabase.from('providers').select('*').order('created_at', { ascending: false });
            const { data: nData, error: nError } = await supabase.from('provider_notes').select('*, providers(name)').order('created_at', { ascending: false }).limit(50);
            
            if (!pError) providers = pData;
            if (!nError) globalNotes = nData;
            
            renderView();
            sync.innerHTML = '<div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div><span>SYSTEM ONLINE</span>';
        }

        async function saveProvider() {
            const provider = getFormData();
            const { error } = await supabase.from('providers').insert([provider]);
            if (!error) { closeModal(); await refreshData(); }
            else alert("Error: " + error.message);
        }

        async function updateProvider(id) {
            const provider = getFormData();
            const { error } = await supabase.from('providers').update(provider).eq('id', id);
            if (!error) { closeModal(); await refreshData(); }
            else alert("Error: " + error.message);
        }

        function getFormData() {
            return {
                name: document.getElementById('m-name').value,
                email: document.getElementById('m-email').value,
                phone: document.getElementById('m-phone').value,
                specialty: document.getElementById('m-specialty').value,
                npi: document.getElementById('m-npi').value,
                state: document.getElementById('m-state').value,
                status: document.getElementById('m-status').value,
                license_number: document.getElementById('m-license').value,
                license_expiry: document.getElementById('m-expiry').value || null
            };
        }

        async function deleteProvider(id) {
            if (!confirm('Are you sure? This deletes the provider and all history.')) return;
            await supabase.from('provider_notes').delete().eq('provider_id', id);
            const { error } = await supabase.from('providers').delete().eq('id', id);
            if (!error) await refreshData();
        }

        function handleSearch(val) {
            const filtered = providers.filter(p => 
                p.name?.toLowerCase().includes(val.toLowerCase()) || 
                p.specialty?.toLowerCase().includes(val.toLowerCase()) ||
                p.state?.toLowerCase().includes(val.toLowerCase())
            );
            renderView(filtered);
        }

        function showView(view) {
            window.currentView = view;
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('text-white', 'bg-white/5'));
            document.getElementById(`nav-${view}`).classList.add('text-white', 'bg-white/5');
            renderView();
        }

        function renderView(data = providers) {
            const container = document.getElementById('content-view');
            container.scrollTo(0, 0);
            container.innerHTML = '';
            
            if (window.currentView === 'dashboard') renderDashboard(container);
            else if (window.currentView === 'directory') renderDirectory(container, data);
            else if (window.currentView === 'pipeline') renderPipeline(container);
            else if (window.currentView === 'activity') renderActivity(container);
            
            lucide.createIcons();
        }

        function renderDashboard(container) {
            const activeCount = providers.filter(p => p.status === 'Active').length;
            const recruitingCount = providers.filter(p => p.status === 'Recruiting').length;
            const expiringCount = providers.filter(p => p.license_expiry && new Date(p.license_expiry) < new Date(Date.now() + 30*24*60*60*1000)).length;

            container.innerHTML = `
                <div class="grid grid-cols-4 gap-8 mb-10 animate-in">
                    <div class="glass p-8 rounded-3xl">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-3">Total Database</p>
                        <h3 class="text-4xl font-bold">${providers.length}</h3>
                    </div>
                    <div class="glass p-8 rounded-3xl text-emerald-400">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-3">Active Staff</p>
                        <h3 class="text-4xl font-bold">${activeCount}</h3>
                    </div>
                    <div class="glass p-8 rounded-3xl text-indigo-400">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-3">In Recruitment</p>
                        <h3 class="text-4xl font-bold">${recruitingCount}</h3>
                    </div>
                    <div class="glass p-8 rounded-3xl ${expiringCount > 0 ? 'text-rose-400' : 'text-amber-400'}">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-3">License Alerts</p>
                        <h3 class="text-4xl font-bold">${expiringCount}</h3>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-8 animate-in" style="animation-delay: 0.1s">
                    <div class="col-span-2 glass p-10 rounded-[2rem]">
                        <h2 class="text-xl font-bold mb-8">Recent Activity</h2>
                        <div class="space-y-4">
                            ${globalNotes.slice(0, 5).map(n => `
                                <div class="p-5 bg-slate-900/30 rounded-2xl border border-white/[0.02]">
                                    <p class="text-sm text-slate-300 font-medium">${n.content}</p>
                                    <p class="text-[10px] text-slate-500 uppercase mt-2 font-bold">${n.providers?.name} • ${new Date(n.created_at).toLocaleDateString()}</p>
                                </div>
                            `).join('') || '<p class="text-slate-600 italic">No recent notes</p>'}
                        </div>
                    </div>
                    <div class="glass p-10 rounded-[2rem]">
                        <h2 class="text-xl font-bold mb-8">Specialty Mix</h2>
                        <canvas id="specialtyChart" class="max-h-64"></canvas>
                    </div>
                </div>
            `;
            initCharts();
        }

        function initCharts() {
            const ctx = document.getElementById('specialtyChart');
            if (!ctx) return;
            const specs = {};
            providers.forEach(p => specs[p.specialty] = (specs[p.specialty] || 0) + 1);
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(specs),
                    datasets: [{ data: Object.values(specs), backgroundColor: ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#8b5cf6'], borderWidth: 0 }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } } }
            });
        }

        function renderDirectory(container, data) {
            container.innerHTML = `
                <div class="glass rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl animate-in">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white/[0.02] border-b border-white/5">
                                <th class="p-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Provider</th>
                                <th class="p-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Contact</th>
                                <th class="p-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Status</th>
                                <th class="p-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(p => `
                                <tr class="border-b border-white/[0.02] hover:bg-white/[0.02] transition-all cursor-pointer" onclick="viewProfile(${p.id})">
                                    <td class="p-6">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center font-bold text-indigo-400">${p.name?.[0] || '?'}</div>
                                            <div><p class="font-bold text-sm">${p.name}</p><p class="text-[10px] text-slate-500">${p.specialty}</p></div>
                                        </div>
                                    </td>
                                    <td class="p-6 text-sm">
                                        <p>${p.email || 'No email'}</p>
                                        <p class="text-[10px] text-slate-500">${p.phone || 'No phone'}</p>
                                    </td>
                                    <td class="p-6"><span class="status-badge status-${p.status?.toLowerCase()}">${p.status}</span></td>
                                    <td class="p-6 text-right">
                                        <div class="flex justify-end gap-2">
                                            <button onclick="event.stopPropagation(); openModal('edit', ${p.id})" class="p-2 text-slate-500 hover:text-white rounded-lg hover:bg-white/5"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                            <button onclick="event.stopPropagation(); deleteProvider(${p.id})" class="p-2 text-slate-500 hover:text-rose-400 rounded-lg hover:bg-white/5"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderPipeline(container) {
            const stages = ['Prospect', 'Recruiting', 'Pending', 'Active'];
            container.innerHTML = `
                <div class="grid grid-cols-4 gap-6 h-full animate-in">
                    ${stages.map(stage => `
                        <div class="flex flex-col gap-4">
                            <div class="flex items-center justify-between px-2">
                                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-[0.2em]">${stage}</h3>
                                <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full">${providers.filter(p => p.status === stage).length}</span>
                            </div>
                            <div class="pipeline-col p-4 space-y-4 custom-scrollbar overflow-y-auto">
                                ${providers.filter(p => p.status === stage).map(p => `
                                    <div onclick="viewProfile(${p.id})" class="glass p-4 rounded-2xl border border-white/5 hover:border-indigo-500/30 cursor-pointer shadow-sm transition-all hover:scale-[1.02]">
                                        <p class="font-bold text-xs">${p.name}</p>
                                        <p class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">${p.specialty} | ${p.state}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderActivity(container) {
            container.innerHTML = `
                <div class="glass p-10 rounded-[2.5rem] border border-white/5 animate-in">
                    <h2 class="text-2xl font-bold mb-8">Master Activity Log</h2>
                    <div class="space-y-6">
                        ${globalNotes.map(n => `
                            <div class="flex gap-6 items-start p-6 bg-slate-900/30 rounded-3xl border border-white/[0.02]">
                                <div class="w-12 h-12 bg-indigo-500/10 rounded-2xl flex items-center justify-center shrink-0">
                                    <i data-lucide="message-square" class="text-indigo-400 w-6 h-6"></i>
                                </div>
                                <div>
                                    <p class="text-sm text-slate-200 leading-relaxed font-medium">${n.content}</p>
                                    <div class="flex gap-4 mt-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                                        <span class="text-indigo-400">${n.providers?.name}</span>
                                        <span>•</span>
                                        <span>${new Date(n.created_at).toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('') || '<p class="text-slate-600 italic">No activity recorded yet.</p>'}
                    </div>
                </div>
            `;
        }

        async function viewProfile(id) {
            const p = providers.find(x => x.id === id);
            const container = document.getElementById('content-view');
            container.innerHTML = `
                <div class="flex gap-8 animate-in">
                    <div class="w-1/3 space-y-6">
                        <div class="glass p-10 rounded-[2.5rem] text-center border border-white/5 relative">
                            <button onclick="showView('directory')" class="absolute left-6 top-6 text-slate-500 hover:text-white"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                            <div class="w-24 h-24 rounded-3xl bg-indigo-600 mx-auto flex items-center justify-center text-3xl font-bold shadow-2xl mb-6">${p.name?.[0]}</div>
                            <h2 class="text-2xl font-bold">${p.name}</h2>
                            <p class="text-slate-500 text-sm mt-1">${p.specialty}</p>
                            <div class="mt-8 flex flex-wrap justify-center gap-2">
                                <span class="status-badge status-${p.status.toLowerCase()}">${p.status}</span>
                                <span class="status-badge bg-slate-800 text-slate-400">${p.state}</span>
                            </div>
                        </div>
                        <div class="glass p-8 rounded-3xl space-y-4">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Credentials & Info</h4>
                            <div class="space-y-3">
                                <div class="flex justify-between text-sm"><span class="text-slate-400">NPI</span><span class="font-medium">${p.npi}</span></div>
                                <div class="flex justify-between text-sm"><span class="text-slate-400">License</span><span class="font-medium">${p.license_number || 'N/A'}</span></div>
                                <div class="flex justify-between text-sm"><span class="text-slate-400">Expiry</span><span class="font-medium ${new Date(p.license_expiry) < Date.now() ? 'text-rose-400' : ''}">${p.license_expiry || 'N/A'}</span></div>
                                <hr class="border-white/5">
                                <div class="flex justify-between text-sm"><span class="text-slate-400">Email</span><span class="font-medium">${p.email || 'N/A'}</span></div>
                                <div class="flex justify-between text-sm"><span class="text-slate-400">Phone</span><span class="font-medium">${p.phone || 'N/A'}</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex-1 space-y-6">
                        <div class="glass p-10 rounded-[2.5rem] border border-white/5 min-h-[500px] flex flex-col">
                            <div class="flex justify-between items-center mb-8">
                                <h3 class="text-xl font-bold">Communication History</h3>
                                <button onclick="openNoteModal(${p.id})" class="text-xs font-bold text-indigo-400 hover:text-indigo-300 uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="message-square-plus" class="w-4 h-4"></i> Add Entry
                                </button>
                            </div>
                            <div class="flex-1 space-y-4" id="notes-list">
                                <p class="text-slate-600 text-sm italic">Loading correspondence...</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            loadNotes(id);
        }

        async function loadNotes(pid) {
            const { data, error } = await supabase.from('provider_notes').select('*').eq('provider_id', pid).order('created_at', { ascending: false });
            const list = document.getElementById('notes-list');
            if (data?.length) {
                list.innerHTML = data.map(n => `
                    <div class="p-5 bg-slate-900/40 border border-white/[0.03] rounded-2xl">
                        <p class="text-sm text-slate-300 leading-relaxed">${n.content}</p>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-3">${new Date(n.created_at).toLocaleString()} • System Admin</p>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<div class="flex flex-col items-center justify-center h-48 opacity-20"><i data-lucide="message-square-off" class="w-12 h-12 mb-4"></i><p class="text-xs uppercase font-bold tracking-widest">No entries</p></div>';
            }
            lucide.createIcons();
        }

        function openModal(mode, id = null) {
            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            if (mode === 'edit') {
                const p = providers.find(x => x.id === id);
                document.getElementById('modal-title').innerText = 'Edit Provider Profile';
                document.getElementById('m-name').value = p.name;
                document.getElementById('m-email').value = p.email || '';
                document.getElementById('m-phone').value = p.phone || '';
                document.getElementById('m-specialty').value = p.specialty;
                document.getElementById('m-npi').value = p.npi;
                document.getElementById('m-state').value = p.state;
                document.getElementById('m-status').value = p.status;
                document.getElementById('m-license').value = p.license_number || '';
                document.getElementById('m-expiry').value = p.license_expiry || '';
                document.getElementById('modal-submit').onclick = () => updateProvider(id);
                document.getElementById('modal-submit').innerText = 'Update Information';
            } else {
                document.getElementById('modal-title').innerText = 'New Provider Registration';
                ['m-name', 'm-email', 'm-phone', 'm-specialty', 'm-npi', 'm-state', 'm-license', 'm-expiry'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('m-status').value = 'Prospect';
                document.getElementById('modal-submit').onclick = saveProvider;
                document.getElementById('modal-submit').innerText = 'Complete Registration';
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        function openNoteModal(pid) {
            document.getElementById('note-modal').classList.remove('hidden');
            document.getElementById('note-submit').onclick = async () => {
                const content = document.getElementById('note-content').value;
                if (!content) return;
                const { error } = await supabase.from('provider_notes').insert([{ provider_id: pid, content }]);
                if (!error) {
                    document.getElementById('note-content').value = '';
                    closeNoteModal();
                    loadNotes(pid);
                }
            };
        }
        
        function closeNoteModal() { document.getElementById('note-modal').classList.add('hidden'); }

        function exportToCSV() {
            const headers = ['Name', 'Email', 'Phone', 'Specialty', 'NPI', 'State', 'Status', 'License', 'Expiry'];
            const rows = providers.map(p => [p.name, p.email, p.phone, p.specialty, p.npi, p.state, p.status, p.license_number, p.license_expiry]);
            let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Apex_Providers_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        window.onload = init;
    </script>
</body>
</html>
