<!DOCTYPE html><html lang="en"><head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Apex Teleradiology | Cloud CRM v3.1</title> <script src="https://cdn.tailwindcss.com"></script> <script src="https://unpkg.com/lucide@latest"></script> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; } .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); } .status-badge { padding: 4px 10px; border-radius: 9999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; } .status-active { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); } .status-prospect { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); } .status-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); } .status-recruiting { background: rgba(236, 72, 153, 0.2); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.3); } .pipeline-col { min-height: 500px; background: rgba(15, 23, 42, 0.4); border-radius: 20px; border: 1px dashed rgba(255, 255, 255, 0.05); } .custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-track { background: transparent; } .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; } .animate-in { animation: fadeIn 0.4s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } </style></head><body class="flex h-screen overflow-hidden"> <!-- Config Overlay --> <div id="setup-overlay" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center hidden"> <div class="glass p-10 rounded-3xl max-w-lg w-full text-center space-y-6"> <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4"> <i data-lucide="database" class="text-white w-8 h-8"></i> </div> <h2 class="text-2xl font-bold">Connect Database</h2> <div class="space-y-4 text-left"> <div> <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Supabase URL</label> <input id="db-url" type="text" placeholder="https://xyz.supabase.co" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 text-sm outline-none focus:border-indigo-500 text-white"> </div> <div> <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Public API Key (anon)</label> <input id="db-key" type="password" placeholder="eyJhbG..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 text-sm outline-none focus:border-indigo-500 text-white"> </div> <div class="flex gap-3"> <button onclick="saveConfig()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all">Launch CRM</button> <button onclick="clearConfig()" class="px-6 bg-rose-900/30 hover:bg-rose-900/50 text-rose-400 rounded-xl transition-all text-xs font-bold uppercase">Clear</button> <button onclick="document.getElementById('setup-overlay').classList.add('hidden')" class="px-6 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all">Cancel</button> </div> </div> </div> </div> <aside class="w-64 border-r border-slate-800 flex flex-col glass z-20"> <div class="p-6"> <div class="flex items-center gap-3"> <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center shadow-lg"> <i data-lucide="shield-plus" class="text-white w-6 h-6"></i> </div> <div> <h1 class="font-bold text-lg leading-tight tracking-tight">APEX</h1> <p class="text-[10px] text-slate-500 tracking-[0.2em] uppercase font-bold">Tele-CRM</p> </div> </div> </div> <nav class="flex-1 px-4 space-y-1 mt-4"> <a href="#" onclick="showView('dashboard')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all" id="nav-dashboard"> <i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-sm font-medium">Dashboard</span> </a> <a href="#" onclick="showView('directory')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all" id="nav-directory"> <i data-lucide="users" class="w-5 h-5"></i><span class="text-sm font-medium">Provider Directory</span> </a> <a href="#" onclick="showView('pipeline')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all" id="nav-pipeline"> <i data-lucide="trello" class="w-5 h-5"></i><span class="text-sm font-medium">Recruitment Pipeline</span> </a> <a href="#" onclick="showView('activity')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all" id="nav-activity"> <i data-lucide="activity" class="w-5 h-5"></i><span class="text-sm font-medium">Activity Log</span> </a> <div class="pt-4 border-t border-slate-800/50 mt-4"> <a href="#" onclick="openSetup()" class="flex items-center gap-3 p-3 rounded-xl text-slate-500 hover:text-white hover:bg-white/5 transition-all"> <i data-lucide="settings" class="w-5 h-5"></i><span class="text-sm font-medium">Settings</span> </a> </div> </nav> <div class="p-6 border-t border-slate-800"> <div id="sync-indicator" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-slate-900/50 text-[10px] text-slate-400 border border-slate-800"> <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div> <span>SYSTEM ONLINE</span> </div> </div> </aside> <main class="flex-1 flex flex-col min-w-0 bg-[#0a0f1d]"> <header class="h-20 border-b border-slate-800 flex items-center justify-between px-10 glass shrink-0 relative z-10"> <div class="flex items-center gap-4"> <div class="relative w-[400px]"> <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i> <input type="text" id="global-search" oninput="handleSearch(this.value)" placeholder="Search database..." class="w-full bg-slate-900/40 border border-slate-700/50 rounded-xl py-2.5 pl-12 pr-4 text-sm outline-none focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/5 transition-all text-white"> </div> </div> <div class="flex items-center gap-4"> <button onclick="exportToCSV()" class="bg-slate-800 hover:bg-slate-700 text-slate-400 px-4 py-2.5 rounded-xl text-xs font-bold transition-all flex items-center gap-2"> <i data-lucide="download" class="w-4 h-4"></i> EXPORT </button> <button onclick="refreshData()" class="p-2.5 bg-slate-800/50 border border-slate-700/50 rounded-xl text-slate-400 hover:text-white transition-all"> <i data-lucide="refresh-cw" class="w-4 h-4"></i> </button> <button onclick="openModal('add')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg shadow-indigo-600/20"> <i data-lucide="plus-circle" class="w-4 h-4"></i> New Provider </button> </div> </header> <div id="content-view" class="flex-1 overflow-y-auto p-10 custom-scrollbar"></div> </main> <!-- Modal for Provider --> <div id="modal" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center hidden"> <div class="glass p-10 rounded-[2rem] max-w-2xl w-full space-y-8 border border-white/10 shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar"> <div class="flex justify-between items-center"> <h2 class="text-2xl font-bold tracking-tight" id="modal-title">Registration</h2> <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full"><i data-lucide="x" class="w-5 h-5 text-slate-500"></i></button> </div> <div class="grid grid-cols-2 gap-6"> <div class="space-y-1.5 col-span-2"><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Full Name</label><input id="m-name" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none text-white"></div> <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Email</label><input id="m-email" type="email" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none text-white"></div> <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Phone</label><input id="m-phone" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none text-white"></div> <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Specialty</label><input id="m-specialty" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none text-white"></div> <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">NPI Number</label><input id="m-npi" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none text-white"></div> <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">State</label><input id="m-state" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none text-white"></div> <div class="space-y-1.5"> <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Status</label> <select id="m-status" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none appearance-none text-white"> <option value="Prospect">Prospect</option> <option value="Recruiting">Recruiting</option> <option value="Pending">Pending</option> <option value="Active">Active</option> </select> </div> <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">License No.</label><input id="m-license" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none text-white"></div> <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Expiry Date</label><input id="m-expiry" type="date" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none text-white"></div> </div> <div class="flex gap-4 pt-4"><button id="modal-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 transition-all">Complete Action</button></div> </div> </div> <!-- Modal for Notes --> <div id="note-modal" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center hidden"> <div class="glass p-10 rounded-[2rem] max-w-lg w-full space-y-6 border border-white/10 shadow-2xl"> <h2 class="text-2xl font-bold">Add Entry</h2> <textarea id="note-content" rows="6" placeholder="Type your note here..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none resize-none text-white"></textarea> <div class="flex gap-3"> <button id="note-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all">Save</button> <button onclick="closeNoteModal()" class="px-6 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all">Cancel</button> </div> </div> </div> <script> let db; let providers = []; let globalNotes = []; let config = JSON.parse(localStorage.getItem("apex_config")) || null; window.currentView = "dashboard"; async function init() { lucide.createIcons(); if (!config) { document.getElementById("setup-overlay").classList.remove("hidden"); return; } if (typeof supabase === "undefined" || !supabase.createClient) { console.error("Supabase not loaded"); return; } try { db = supabase.createClient(config.url, config.key); await refreshData(); } catch (err) { console.error("Init Error:", err); openSetup(); } } function openSetup() { document.getElementById("setup-overlay").classList.remove("hidden"); if(config) { document.getElementById("db-url").value = config.url || ""; document.getElementById("db-key").value = config.key || ""; } } function saveConfig() { const url = document.getElementById("db-url").value.trim(); const key = document.getElementById("db-key").value.trim(); if (!url || !key) return alert("Required"); localStorage.setItem("apex_config", JSON.stringify({url, key})); location.reload(); } function clearConfig() { if(confirm("Clear database configuration?")) { localStorage.removeItem("apex_config"); location.reload(); } } async function refreshData() { const sync = document.getElementById("sync-indicator"); if(sync) sync.innerHTML = "<div class='w-2 h-2 rounded-full bg-amber-500 animate-pulse'></div><span>SYNCING...</span>"; try { const { data: pData, error: pError } = await db.from("providers").select("*").order("created_at", { ascending: false }); if(pError) throw pError; providers = pData || []; const { data: nData, error: nError } = await db.from("provider_notes").select("*").order("created_at", { ascending: false }).limit(20); globalNotes = nData || []; renderView(); } catch(e) { console.error("Refresh Error:", e); const container = document.getElementById("content-view"); if(container) container.innerHTML = `<div class="p-10 glass rounded-3xl text-rose-400">Error: ${e.message}. Please check your database connection.</div>`; } if(sync) sync.innerHTML = "<div class='w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]'></div><span>SYSTEM ONLINE</span>"; } async function saveProvider() { const data = getFormData(); const { error } = await db.from("providers").insert([data]); if (!error) { closeModal(); await refreshData(); } else { alert("Error saving: " + error.message); } } async function updateProvider(id) { const data = getFormData(); const { error } = await db.from("providers").update(data).eq("id", id); if (!error) { closeModal(); await refreshData(); } else { alert("Error updating: " + error.message); } } function getFormData() { return { name: document.getElementById("m-name").value, email: document.getElementById("m-email").value, phone: document.getElementById("m-phone").value, specialty: document.getElementById("m-specialty").value, npi: document.getElementById("m-npi").value, state: document.getElementById("m-state").value, status: document.getElementById("m-status").value, license_number: document.getElementById("m-license").value, license_expiry: document.getElementById("m-expiry").value || null }; } async function deleteProvider(id) { if (!confirm("Delete this provider and all their notes?")) return; await db.from("provider_notes").delete().eq("provider_id", id); await db.from("providers").delete().eq("id", id); await refreshData(); } function handleSearch(val) { const filtered = providers.filter(p => (p.name || "").toLowerCase().includes(val.toLowerCase()) || (p.specialty || "").toLowerCase().includes(val.toLowerCase()) || (p.state || "").toLowerCase().includes(val.toLowerCase()) ); renderView(filtered); } function showView(view) { window.currentView = view; document.querySelectorAll("nav a").forEach(a => a.classList.remove("text-white", "bg-white/5")); const el = document.getElementById(`nav-${view}`); if(el) el.classList.add("text-white", "bg-white/5"); renderView(); } function renderView(data = providers) { const container = document.getElementById("content-view"); if(!container) return; container.innerHTML = ""; try { if (window.currentView === "dashboard") renderDashboard(container); else if (window.currentView === "directory") renderDirectory(container, data); else if (window.currentView === "pipeline") renderPipeline(container); else if (window.currentView === "activity") renderActivity(container); if (window.lucide) lucide.createIcons(); } catch (err) { console.error("Render View Error:", err); container.innerHTML = `<div class="p-10 glass rounded-3xl text-rose-400">Rendering Error: ${err.message}</div>`; } } function renderDashboard(container) { const active = providers.filter(p => p.status === "Active").length; const recruiting = providers.filter(p => p.status === "Recruiting").length; const expiring = providers.filter(p => p.license_expiry && new Date(p.license_expiry) < new Date(Date.now() + 30*24*60*60*1000)).length; container.innerHTML = ` <div class="grid grid-cols-4 gap-8 mb-10 animate-in"> <div class="glass p-8 rounded-3xl"><p class="text-slate-500 text-[10px] font-bold uppercase mb-3">Total</p><h3 class="text-4xl font-bold">${providers.length}</h3></div> <div class="glass p-8 rounded-3xl text-emerald-400"><p class="text-slate-500 text-[10px] font-bold uppercase mb-3">Active</p><h3 class="text-4xl font-bold">${active}</h3></div> <div class="glass p-8 rounded-3xl text-indigo-400"><p class="text-slate-500 text-[10px] font-bold uppercase mb-3">Pipeline</p><h3 class="text-4xl font-bold">${recruiting}</h3></div> <div class="glass p-8 rounded-3xl ${expiring > 0 ? 'text-rose-400' : 'text-amber-400'}"><p class="text-slate-500 text-[10px] font-bold uppercase mb-3">Alerts</p><h3 class="text-4xl font-bold">${expiring}</h3></div> </div> <div class="grid grid-cols-3 gap-8 animate-in"> <div class="col-span-2 glass p-10 rounded-[2rem]"><h2 class="text-xl font-bold mb-8">Recent Notes</h2><div class="space-y-4"> ${globalNotes.length ? globalNotes.map(n => { const p = providers.find(x => x.id === n.provider_id); return `<div class="p-4 bg-slate-900/30 rounded-2xl"><p class="text-sm text-slate-300">${n.content}</p><p class="text-[10px] text-slate-500 uppercase mt-2">${p ? p.name : 'Unknown'} • ${new Date(n.created_at).toLocaleDateString()}</p></div>`; }).join("") : '<p class="text-slate-500 text-sm">No recent activity.</p>'} </div></div> <div class="glass p-10 rounded-[2rem]"><h2 class="text-xl font-bold mb-8">Specialties</h2><canvas id="specialtyChart"></canvas></div> </div> `; initCharts(); } function initCharts() { const ctx = document.getElementById("specialtyChart"); if (!ctx || typeof Chart === "undefined") return; const specs = {}; providers.forEach(p => { const s = p.specialty || "Unspecified"; specs[s] = (specs[s] || 0) + 1; }); new Chart(ctx, { type: "doughnut", data: { labels: Object.keys(specs), datasets: [{ data: Object.values(specs), backgroundColor: ["#6366f1","#ec4899","#f59e0b","#10b981","#8b5cf6"], borderWidth:0 }] }, options: { plugins: { legend: { display: false } } } }); } function renderDirectory(container, data) { container.innerHTML = ` <div class="glass rounded-[2rem] overflow-hidden animate-in"> <table class="w-full text-left"> <tr class="bg-white/5 border-b border-white/5"><th class="p-6 text-[10px] font-bold uppercase">Provider</th><th class="p-6 text-[10px] font-bold uppercase">Contact</th><th class="p-6 text-[10px] font-bold uppercase">Status</th><th class="p-6 text-right"></th></tr> ${data.length ? data.map(p => { const isExpiring = p.license_expiry && new Date(p.license_expiry) < new Date(Date.now() + 30*24*60*60*1000); return ` <tr class="border-b border-white/5 hover:bg-white/5 cursor-pointer" onclick="viewProfile(${p.id})"> <td class="p-6"> <p class="font-bold text-sm ${isExpiring ? 'text-rose-400' : ''}">${p.name || 'Unnamed'}</p> <p class="text-[10px] text-slate-500">${p.specialty || 'No Specialty'} • ${p.state || 'N/A'}</p> </td> <td class="p-6 text-sm"><p>${p.email || '-'}</p><p class="text-[10px] text-slate-500">${p.phone || '-'}</p></td> <td class="p-6"><span class="status-badge status-${(p.status || 'prospect').toLowerCase()}">${p.status || 'Prospect'}</span></td> <td class="p-6 text-right"><button onclick="event.stopPropagation(); openModal('edit', ${p.id})" class="p-2 text-slate-500 hover:text-white"><i data-lucide="edit-3" class="w-4 h-4"></i></button></td> </tr> `; }).join("") : '<tr><td colspan="4" class="p-10 text-center text-slate-500">No providers found.</td></tr>'} </table> </div> `; } function renderPipeline(container) { const stages = ["Prospect", "Recruiting", "Pending", "Active"]; container.innerHTML = `<div class="grid grid-cols-4 gap-6 h-full animate-in"> ${stages.map(stage => ` <div class="flex flex-col gap-4"> <div class="flex justify-between px-2 text-[10px] font-bold text-slate-500 uppercase"><span>${stage}</span><span>${providers.filter(p => p.status === stage).length}</span></div> <div class="pipeline-col p-4 space-y-4 overflow-y-auto"> ${providers.filter(p => p.status === stage).map(p => ` <div onclick="viewProfile(${p.id})" class="glass p-4 rounded-2xl cursor-pointer hover:border-indigo-500/30 transition-all"><p class="font-bold text-xs">${p.name || 'Unnamed'}</p><p class="text-[10px] text-slate-500 uppercase mt-1">${p.specialty || 'No Specialty'}</p></div> `).join("")} </div> </div> `).join("")} </div>`; } function renderActivity(container) { container.innerHTML = `<div class="glass p-10 rounded-[2.5rem] animate-in"><h2 class="text-2xl font-bold mb-8">Activity Log</h2><div class="space-y-6"> ${globalNotes.length ? globalNotes.map(n => { const p = providers.find(x => x.id === n.provider_id); return `<div class="flex gap-6 p-6 bg-slate-900/30 rounded-3xl border border-white/5"><i data-lucide="message-square" class="text-indigo-400 w-6 h-6"></i><div><p class="text-sm text-slate-200">${n.content}</p><p class="text-[10px] font-bold text-slate-500 uppercase mt-2">${p ? p.name : 'Unknown'} • ${new Date(n.created_at).toLocaleString()}</p></div></div>`; }).join("") : '<p class="text-slate-500">No recent activity.</p>'} </div></div>`; } async function viewProfile(id) { const p = providers.find(x => x.id === id); if(!p) return; const container = document.getElementById("content-view"); container.innerHTML = ` <div class="flex gap-8 animate-in"> <div class="w-1/3 space-y-6"> <div class="glass p-10 rounded-[2.5rem] text-center relative"> <button onclick="showView('directory')" class="absolute left-6 top-6 text-slate-500"><i data-lucide="arrow-left" class="w-5 h-5"></i></button> <div class="w-24 h-24 rounded-3xl bg-indigo-600 mx-auto flex items-center justify-center text-3xl font-bold mb-6">${(p.name || "?")[0]}</div> <h2 class="text-2xl font-bold">${p.name || 'Unnamed'}</h2><p class="text-slate-500 text-sm">${p.specialty || 'No Specialty'}</p> <div class="mt-8 flex justify-center gap-2"><span class="status-badge status-${(p.status || 'prospect').toLowerCase()}">${p.status || 'Prospect'}</span></div> </div> <div class="glass p-8 rounded-3xl space-y-4 text-sm"> <div class="flex justify-between"><span class="text-slate-400">NPI</span><span>${p.npi || '-'}</span></div> <div class="flex justify-between"><span class="text-slate-400">License</span><span>${p.license_number || '-'}</span></div> <div class="flex justify-between"><span class="text-slate-400">Expiry</span><span>${p.license_expiry || '-'}</span></div> <div class="pt-4 border-t border-slate-800"><button onclick="deleteProvider(${p.id})" class="text-rose-500 text-xs font-bold uppercase hover:text-rose-400">Delete Provider</button></div> </div> </div> <div class="flex-1 glass p-10 rounded-[2.5rem] flex flex-col min-h-[500px]"> <div class="flex justify-between mb-8"><h3 class="text-xl font-bold">Notes</h3><button onclick="openNoteModal(${p.id})" class="text-xs font-bold text-indigo-400">ADD ENTRY</button></div> <div id="notes-list" class="space-y-4"></div> </div> </div> `; loadNotes(id); } async function loadNotes(pid) { const { data } = await db.from("provider_notes").select("*").eq("provider_id", pid).order("created_at", { ascending: false }); document.getElementById("notes-list").innerHTML = data?.map(n => ` <div class="p-4 bg-slate-900/40 rounded-2xl group relative"> <p class="text-sm text-slate-300">${n.content}</p> <p class="text-[10px] text-slate-500 uppercase mt-2">${new Date(n.created_at).toLocaleString()}</p> <button onclick="deleteNote(${n.id}, ${pid})" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-600 hover:text-rose-400 transition-all"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button> </div> `).join("") || '<p class="text-slate-500 text-sm">No notes yet.</p>'; if (window.lucide) lucide.createIcons(); } async function deleteNote(nid, pid) { if(!confirm("Delete this note?")) return; const { error } = await db.from("provider_notes").delete().eq("id", nid); if(!error) loadNotes(pid); else alert(error.message); } function openModal(mode, id = null) { document.getElementById("modal").classList.remove("hidden"); if (mode === "edit") { const p = providers.find(x => x.id === id); document.getElementById("modal-title").innerText = "Edit Provider"; document.getElementById("m-name").value = p.name || ""; document.getElementById("m-email").value = p.email || ""; document.getElementById("m-phone").value = p.phone || ""; document.getElementById("m-specialty").value = p.specialty || ""; document.getElementById("m-npi").value = p.npi || ""; document.getElementById("m-state").value = p.state || ""; document.getElementById("m-status").value = p.status || "Prospect"; document.getElementById("m-license").value = p.license_number || ""; document.getElementById("m-expiry").value = p.license_expiry || ""; document.getElementById("modal-submit").onclick = () => updateProvider(id); } else { document.getElementById("modal-title").innerText = "New Provider"; ["m-name","m-email","m-phone","m-specialty","m-npi","m-state","m-license","m-expiry"].forEach(f => document.getElementById(f).value = ""); document.getElementById("m-status").value = "Prospect"; document.getElementById("modal-submit").onclick = saveProvider; } if (window.lucide) lucide.createIcons(); } function closeModal() { document.getElementById("modal").classList.add("hidden"); } function openNoteModal(pid) { document.getElementById("note-modal").classList.remove("hidden"); document.getElementById("note-submit").onclick = async () => { const content = document.getElementById("note-content").value; if (!content) return; const { error } = await db.from("provider_notes").insert([{ provider_id: pid, content }]); if(!error) { closeNoteModal(); loadNotes(pid); } else { alert("Error adding note: " + error.message); } }; } function closeNoteModal() { document.getElementById("note-modal").classList.add("hidden"); document.getElementById("note-content").value = ""; } function exportToCSV() { let csv = "Name,Email,Phone,Specialty,NPI,State,Status,License,Expiry\n"; providers.forEach(p => csv += `"${p.name}","${p.email}","${p.phone}","${p.specialty}","${p.npi}","${p.state}","${p.status}","${p.license_number}","${p.license_expiry}"\n`); const blob = new Blob([csv], { type: "text/csv" }); const url = window.URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `providers_export_${new Date().toISOString().split('T')[0]}.csv`; a.click(); } window.onload = init; </script></body></html>
