<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Teleradiology | Cloud CRM v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-badge { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .status-active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-recruiting { background: rgba(99, 102, 241, 0.2); color: #6366f1; }
        .loading-shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Config Overlay (Only shows if keys are missing) -->
    <div id="setup-overlay" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center hidden">
        <div class="glass p-10 rounded-3xl max-w-lg w-full text-center space-y-6">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="database" class="text-white w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold">Connect Your Database</h2>
            <p class="text-slate-400 text-sm">To support 200+ employees, Apex CRM needs a cloud database. Please enter your Supabase details below.</p>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Supabase URL</label>
                    <input id="db-url" type="text" placeholder="https://xyz.supabase.co" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 text-sm outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Public API Key</label>
                    <input id="db-key" type="password" placeholder="eyJhbG..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 text-sm outline-none focus:border-indigo-500">
                </div>
                <button onclick="saveConfig()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-bold transition-all">Enable Cloud Sync</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-64 border-r border-slate-800 flex flex-col glass z-20">
        <div class="p-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg">
                    <i data-lucide="activity" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">APEX</h1>
                    <p class="text-[10px] text-slate-400 tracking-widest uppercase font-semibold">Cloud CRM</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1 mt-4">
            <a href="#" onclick="showView('dashboard')" class="flex items-center gap-3 p-3 rounded-lg text-slate-300 hover:bg-slate-800/50" id="nav-dashboard">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-sm">Dashboard</span>
            </a>
            <a href="#" onclick="showView('directory')" class="flex items-center gap-3 p-3 rounded-lg text-slate-300 hover:bg-slate-800/50" id="nav-directory">
                <i data-lucide="users" class="w-5 h-5"></i><span class="text-sm">Providers</span>
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div id="sync-indicator" class="flex items-center gap-2 px-2 py-1 text-[10px] text-slate-500">
                <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                Cloud Connected
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 glass shrink-0">
            <div class="relative w-96">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                <input type="text" id="global-search" oninput="handleSearch(this.value)" placeholder="Search cloud database..." class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-2 pl-10 pr-4 text-sm outline-none focus:border-indigo-500">
            </div>
            <div class="flex items-center gap-4">
                <button onclick="refreshData()" class="p-2 text-slate-400 hover:text-white"><i data-lucide="rotate-cw" class="w-5 h-5"></i></button>
                <button onclick="openModal('add')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> New Provider
                </button>
            </div>
        </header>
        <div id="content-view" class="flex-1 overflow-y-auto p-8"></div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center hidden">
        <div class="glass p-8 rounded-3xl max-w-md w-full space-y-6">
            <h2 class="text-xl font-bold" id="modal-title">Add New Provider</h2>
            <div class="space-y-4">
                <input id="m-name" type="text" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm">
                <input id="m-specialty" type="text" placeholder="Specialty" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input id="m-state" type="text" placeholder="State" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm">
                    <input id="m-npi" type="text" placeholder="NPI" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm">
                </div>
                <select id="m-status" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm">
                    <option value="Active">Active</option>
                    <option value="Recruiting">Recruiting</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="closeModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold">Cancel</button>
                <button id="modal-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold">Save Provider</button>
            </div>
        </div>
    </div>

    <script>
        let supabase;
        let providers = [];
        let config = JSON.parse(localStorage.getItem('apex_config')) || null;

        async function init() {
            lucide.createIcons();
            if (!config) {
                document.getElementById('setup-overlay').classList.remove('hidden');
                return;
            }
            supabase = supabase.createClient(config.url, config.key);
            showView('dashboard');
            refreshData();
        }

        function saveConfig() {
            const url = document.getElementById('db-url').value;
            const key = document.getElementById('db-key').value;
            if (!url || !key) return alert('Both fields required');
            config = { url, key };
            localStorage.setItem('apex_config', JSON.stringify(config));
            location.reload();
        }

        async function refreshData() {
            const sync = document.getElementById('sync-indicator');
            sync.innerHTML = '<div class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div> Syncing...';
            
            const { data, error } = await supabase.from('providers').select('*').order('created_at', { ascending: false });
            if (!error) {
                providers = data;
                renderView();
            }
            sync.innerHTML = '<div class="w-2 h-2 rounded-full bg-emerald-500"></div> Cloud Connected';
        }

        async function saveProvider() {
            const provider = {
                name: document.getElementById('m-name').value,
                specialty: document.getElementById('m-specialty').value,
                state: document.getElementById('m-state').value,
                npi: document.getElementById('m-npi').value,
                status: document.getElementById('m-status').value
            };
            const { error } = await supabase.from('providers').insert([provider]);
            if (!error) { closeModal(); refreshData(); }
        }

        function showView(view) {
            window.currentView = view;
            renderView();
        }

        function renderView() {
            const container = document.getElementById('content-view');
            if (window.currentView === 'dashboard') {
                container.innerHTML = `
                    <div class="grid grid-cols-4 gap-6 mb-8">
                        <div class="glass p-6 rounded-2xl">
                            <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Total Team Assets</p>
                            <h3 class="text-3xl font-bold">${providers.length}</h3>
                        </div>
                        <div class="glass p-6 rounded-2xl">
                            <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Active Reads</p>
                            <h3 class="text-3xl font-bold text-emerald-400">${providers.filter(p => p.status === 'Active').length}</h3>
                        </div>
                    </div>
                    <div class="glass p-8 rounded-3xl">
                        <h2 class="text-xl font-bold mb-6">Recent Activity</h2>
                        <div class="space-y-4">
                            ${providers.slice(0, 5).map(p => `
                                <div class="flex items-center justify-between p-4 bg-slate-900/30 rounded-xl">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-full bg-indigo-500/10 flex items-center justify-center text-indigo-400 font-bold">${p.name[0]}</div>
                                        <div><p class="font-bold text-sm">${p.name}</p><p class="text-[10px] text-slate-500">${p.specialty}</p></div>
                                    </div>
                                    <span class="status-badge status-${p.status.toLowerCase()}">${p.status}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="glass rounded-3xl overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-900/50">
                                <tr>
                                    <th class="p-5 text-[10px] font-bold text-slate-500 uppercase">Provider</th>
                                    <th class="p-5 text-[10px] font-bold text-slate-500 uppercase">Details</th>
                                    <th class="p-5 text-[10px] font-bold text-slate-500 uppercase">Status</th>
                                    <th class="p-5 text-[10px] font-bold text-slate-500 uppercase text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${providers.map(p => `
                                    <tr class="border-b border-slate-800/50 hover:bg-slate-800/20">
                                        <td class="p-5">
                                            <p class="font-bold text-sm">${p.name}</p>
                                            <p class="text-[10px] text-slate-500">NPI: ${p.npi}</p>
                                        </td>
                                        <td class="p-5"><p class="text-sm">${p.specialty}</p><p class="text-[10px] text-slate-500">${p.state}</p></td>
                                        <td class="p-5"><span class="status-badge status-${p.status.toLowerCase()}">${p.status}</span></td>
                                        <td class="p-5 text-right"><button class="text-slate-500 hover:text-white"><i data-lucide="edit-3" class="w-4 h-4"></i></button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function openModal(mode) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-submit').onclick = saveProvider;
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
