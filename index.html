<!DOCTYPE html><html lang="en"><head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>APEX | Cloud CRM v4.0</title> <script src="https://cdn.tailwindcss.com"></script> <script src="https://unpkg.com/lucide@latest"></script> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); body { font-family: 'Inter', sans-serif; background-color: #07091a; color: #f8fafc; } .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); } .status-badge { padding: 4px 10px; border-radius: 9999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; } .custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; } .animate-in { animation: fadeIn 0.4s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } </style></head><body class="flex h-screen overflow-hidden"> <div id="setup-overlay" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center hidden"> <div class="glass p-10 rounded-3xl max-w-lg w-full text-center space-y-6"> <h2 class="text-2xl font-bold">Connect Apex Database</h2> <div class="space-y-4 text-left"> <div><label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">URL</label><input id="db-url" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 text-sm outline-none focus:border-cyan-500 text-white"></div> <div><label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">API Key</label><input id="db-key" type="password" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mt-1 text-sm outline-none focus:border-cyan-500 text-white"></div> <button onclick="saveConfig()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-bold transition-all">Launch CRM</button> </div> </div> </div> <aside class="w-72 border-r border-white/5 flex flex-col glass z-20 overflow-y-auto custom-scrollbar"> <div class="p-8"><h1 class="font-bold text-xl tracking-tighter text-cyan-400">APEX <span class="text-white/40 font-light">CRM</span></h1></div> <nav class="flex-1 px-4 space-y-8 pb-10"> <div> <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Core System</p> <a href="#" onclick="showView('dashboard')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-dashboard"><i data-lucide="layout-dashboard" class="w-4 h-4"></i><span class="text-sm">Dashboard</span></a> </div> <div> <p class="px-4 text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-4">Provider CRM</p> <a href="#" onclick="showView('physicians')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-physicians"><i data-lucide="users" class="w-4 h-4"></i><span class="text-sm">Physicians</span></a> <a href="#" onclick="showView('ppipeline')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-ppipeline"><i data-lucide="trello" class="w-4 h-4"></i><span class="text-sm">Recruitment Pipeline</span></a> <a href="#" onclick="showView('skills')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-skills"><i data-lucide="grid" class="w-4 h-4"></i><span class="text-sm">Skills Matrix</span></a> <a href="#" onclick="showView('licenses')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-licenses"><i data-lucide="award" class="w-4 h-4"></i><span class="text-sm">License Monitor</span></a> </div> <div> <p class="px-4 text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-4">Client CRM</p> <a href="#" onclick="showView('clients')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-clients"><i data-lucide="building-2" class="w-4 h-4"></i><span class="text-sm">Client Accounts</span></a> <a href="#" onclick="showView('cpipeline')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-cpipeline"><i data-lucide="bar-chart-3" class="w-4 h-4"></i><span class="text-sm">Client Pipeline</span></a> </div> <div> <p class="px-4 text-[10px] font-bold text-teal-500 uppercase tracking-widest mb-4">Matching</p> <a href="#" onclick="showView('matching')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-matching"><i data-lucide="zap" class="w-4 h-4"></i><span class="text-sm">Matching & Proposals</span></a> </div> <div> <p class="px-4 text-[10px] font-bold text-rose-500 uppercase tracking-widest mb-4">Operations</p> <a href="#" onclick="showView('booking')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-booking"><i data-lucide="calendar-check" class="w-4 h-4"></i><span class="text-sm">Shift Booking</span></a> <a href="#" onclick="showView('finance')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-finance"><i data-lucide="banknote" class="w-4 h-4"></i><span class="text-sm">Invoicing</span></a> </div> </nav> </aside> <main class="flex-1 flex flex-col min-w-0 bg-[#0a0f1d]"> <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 glass shrink-0 relative z-10"> <div class="flex items-center gap-4"><input type="text" id="global-search" placeholder="Global search..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm w-80 outline-none focus:border-cyan-500 transition-all"></div> <div class="flex items-center gap-4"> <button onclick="openModal('provider')" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all">+ Provider</button> <button onclick="openModal('client')" class="bg-amber-600 hover:bg-amber-500 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all">+ Client</button> </div> </header> <div id="content-view" class="flex-1 overflow-y-auto p-10 custom-scrollbar"></div> </main> <script> let db; let providers = [], clients = [], requests = [], matches = []; let config = JSON.parse(localStorage.getItem("apex_config")); async function init() { lucide.createIcons(); if (!config) { document.getElementById("setup-overlay").classList.remove("hidden"); return; } db = supabase.createClient(config.url, config.key); await refreshData(); showView('dashboard'); } function saveConfig() { const url = document.getElementById("db-url").value; const key = document.getElementById("db-key").value; localStorage.setItem("apex_config", JSON.stringify({url, key})); location.reload(); } async function refreshData() { try { const {data:p} = await db.from('providers').select('*'); providers = p || []; const {data:c} = await db.from('clients').select('*'); clients = c || []; const {data:r} = await db.from('coverage_requests').select('*'); requests = r || []; const {data:m} = await db.from('matches').select('*'); matches = m || []; renderView(); } catch(e) { console.error(e); } } function showView(v) { window.currentView = v; document.querySelectorAll('nav a').forEach(a => a.classList.remove('bg-white/10', 'text-white')); const el = document.getElementById('nav-'+v); if(el) el.classList.add('bg-white/10', 'text-white'); renderView(); } function renderView() { const c = document.getElementById('content-view'); c.innerHTML = ''; if(window.currentView === 'dashboard') renderDashboard(c); else if(window.currentView === 'physicians') renderPhysicians(c); else if(window.currentView === 'ppipeline') renderPipeline(c, providers); else if(window.currentView === 'clients') renderClients(c); else if(window.currentView === 'cpipeline') renderPipeline(c, clients, 'Client Pipeline'); else if(window.currentView === 'matching') renderMatching(c); else c.innerHTML = '<div class=\"p-20 text-center text-white/20 font-bold uppercase tracking-widest text-4xl\">Module Coming Soon</div>'; if(window.lucide) lucide.createIcons(); } function renderDashboard(c) { c.innerHTML = `<div class=\"grid grid-cols-4 gap-6 mb-10 animate-in\"> <div class=\"glass p-8 rounded-3xl\"><p class=\"text-slate-500 text-[10px] font-bold uppercase mb-2\">Providers</p><h3 class=\"text-4xl font-bold\">${providers.length}</h3></div> <div class=\"glass p-8 rounded-3xl\"><p class=\"text-slate-500 text-[10px] font-bold uppercase mb-2\">Active Clients</p><h3 class=\"text-4xl font-bold text-amber-400\">${clients.length}</h3></div> <div class=\"glass p-8 rounded-3xl\"><p class=\"text-slate-500 text-[10px] font-bold uppercase mb-2\">Open Requests</p><h3 class=\"text-4xl font-bold text-teal-400\">${requests.length}</h3></div> <div class=\"glass p-8 rounded-3xl\"><p class=\"text-slate-500 text-[10px] font-bold uppercase mb-2\">Matches</p><h3 class=\"text-4xl font-bold text-cyan-400\">${matches.length}</h3></div> </div>`; } function renderPhysicians(c) { c.innerHTML = `<div class=\"glass rounded-3xl overflow-hidden animate-in\"><table class=\"w-full text-left\"><tr class=\"bg-white/5 border-b border-white/5\"><th class=\"p-6 text-[10px] font-bold uppercase text-slate-500\">Name</th><th class=\"p-6 text-[10px] font-bold uppercase text-slate-500\">Specialty</th><th class=\"p-6 text-[10px] font-bold uppercase text-slate-500\">Status</th></tr> ${providers.map(p => `<tr class=\"border-b border-white/5 hover:bg-white/5\"><td class=\"p-6 font-bold\">${p.name}</td><td class=\"p-6\">${p.specialty}</td><td class=\"p-6\"><span class=\"status-badge bg-blue-500/20 text-blue-400\">${p.status}</span></td></tr>`).join('')} </table></div>`; } function renderClients(c) { c.innerHTML = `<div class=\"glass rounded-3xl overflow-hidden animate-in\"><table class=\"w-full text-left\"><tr class=\"bg-white/5 border-b border-white/5\"><th class=\"p-6 text-[10px] font-bold uppercase text-slate-500\">Account Name</th><th class=\"p-6 text-[10px] font-bold uppercase text-slate-500\">Location</th><th class=\"p-6 text-[10px] font-bold uppercase text-slate-500\">Status</th></tr> ${clients.map(cl => `<tr class=\"border-b border-white/5 hover:bg-white/5\"><td class=\"p-6 font-bold\">${cl.name}</td><td class=\"p-6\">${cl.location}</td><td class=\"p-6\"><span class=\"status-badge bg-amber-500/20 text-amber-400\">${cl.status}</span></td></tr>`).join('')} </table></div>`; } function renderPipeline(c, data, title = 'Pipeline') { const stages = ['Prospect', 'Recruiting', 'Pending', 'Active']; c.innerHTML = `<h2 class=\"text-xl font-bold mb-6\">${title}</h2><div class=\"grid grid-cols-4 gap-6 h-full animate-in\"> ${stages.map(s => `<div class=\"flex flex-col gap-4\"><p class=\"text-[10px] font-bold text-white/40 uppercase\">${s}</p><div class=\"min-h-[400px] bg-white/5 rounded-2xl p-4 space-y-4\"> ${data.filter(x => x.status === s).map(x => `<div class=\"glass p-4 rounded-xl text-xs font-bold\">${x.name}</div>`).join('')} </div></div>`).join('')} </div>`; } function renderMatching(c) { c.innerHTML = `<div class=\"glass p-10 rounded-[2rem] text-center animate-in\"><i data-lucide=\"zap\" class=\"w-12 h-12 text-teal-400 mx-auto mb-6\"></i><h2 class=\"text-2xl font-bold mb-2\">Matching Engine</h2><p class=\"text-slate-500\">Analyze client requests against provider credentials and availability.</p></div>`; } window.onload = init; </script></body></html>
