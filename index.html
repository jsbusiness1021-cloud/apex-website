<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Cloud CRM v4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #07091a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-badge { padding: 4px 10px; border-radius: 9999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center modal-overlay hidden">
        <div class="glass p-8 rounded-3xl max-w-lg w-full space-y-6 animate-in">
            <div class="flex justify-between items-center">
                <h2 id="modal-title" class="text-xl font-bold">Add New</h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div id="modal-body" class="space-y-4"></div>
        </div>
    </div>

    <aside class="w-72 border-r border-white/5 flex flex-col glass z-20 overflow-y-auto custom-scrollbar">
        <div class="p-8"><h1 class="font-bold text-xl tracking-tighter text-cyan-400">APEX <span class="text-white/40 font-light">CRM</span></h1></div>
        <nav class="flex-1 px-4 space-y-8 pb-10">
            <div>
                <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Core System</p>
                <a href="#" onclick="showView('dashboard')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-dashboard"><i data-lucide="layout-dashboard" class="w-4 h-4"></i><span class="text-sm">Dashboard</span></a>
            </div>
            <div>
                <p class="px-4 text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-4">Provider CRM</p>
                <a href="#" onclick="showView('physicians')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-physicians"><i data-lucide="users" class="w-4 h-4"></i><span class="text-sm">Physicians</span></a>
                <a href="#" onclick="showView('ppipeline')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-ppipeline"><i data-lucide="trello" class="w-4 h-4"></i><span class="text-sm">Recruitment Pipeline</span></a>
                <a href="#" onclick="showView('skills')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-skills"><i data-lucide="grid" class="w-4 h-4"></i><span class="text-sm">Skills Matrix</span></a>
                <a href="#" onclick="showView('licenses')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-licenses"><i data-lucide="award" class="w-4 h-4"></i><span class="text-sm">License Monitor</span></a>
            </div>
            <div>
                <p class="px-4 text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-4">Client CRM</p>
                <a href="#" onclick="showView('clients')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-clients"><i data-lucide="building-2" class="w-4 h-4"></i><span class="text-sm">Client Accounts</span></a>
                <a href="#" onclick="showView('cpipeline')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-cpipeline"><i data-lucide="bar-chart-3" class="w-4 h-4"></i><span class="text-sm">Client Pipeline</span></a>
            </div>
            <div>
                <p class="px-4 text-[10px] font-bold text-teal-500 uppercase tracking-widest mb-4">Matching</p>
                <a href="#" onclick="showView('matching')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-matching"><i data-lucide="zap" class="w-4 h-4"></i><span class="text-sm">Matching & Proposals</span></a>
            </div>
            <div>
                <p class="px-4 text-[10px] font-bold text-rose-500 uppercase tracking-widest mb-4">Operations</p>
                <a href="#" onclick="showView('booking')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-booking"><i data-lucide="calendar-check" class="w-4 h-4"></i><span class="text-sm">Shift Booking</span></a>
                <a href="#" onclick="showView('finance')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-finance"><i data-lucide="banknote" class="w-4 h-4"></i><span class="text-sm">Invoicing</span></a>
                <a href="#" onclick="showView('activity')" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white transition-all" id="nav-activity"><i data-lucide="list-todo" class="w-4 h-4"></i><span class="text-sm">Activity Log</span></a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-[#0a0f1d]">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 glass shrink-0 relative z-10">
            <div class="flex items-center gap-4"><input type="text" id="global-search" placeholder="Global search..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm w-80 outline-none focus:border-cyan-500 transition-all"></div>
            <div class="flex items-center gap-4">
                <button onclick="openModal('provider')" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all">+ Provider</button>
                <button onclick="openModal('client')" class="bg-amber-600 hover:bg-amber-500 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all">+ Client</button>
            </div>
        </header>
        <div id="content-view" class="flex-1 overflow-y-auto p-10 custom-scrollbar"></div>
    </main>

    <script>
        let db;
        let providers = [], clients = [], requests = [], matches = [], logs = [];
        let config = JSON.parse(localStorage.getItem("apex_config"));

        async function init() {
            lucide.createIcons();
            if (!config) {
                // If no config, we expect the user to have run the setup modal or provide keys
                // For this takeover, we assume credentials exist in storage or we provide a fallback
                // db = supabase.createClient('URL', 'KEY');
            }
            if(config) {
                db = supabase.createClient(config.url, config.key);
                await refreshData();
            }
            showView('dashboard');
        }

        async function refreshData() {
            if(!db) return;
            try {
                const {data:p} = await db.from('providers').select('*');
                providers = p || [];
                const {data:c} = await db.from('clients').select('*');
                clients = c || [];
                const {data:r} = await db.from('coverage_requests').select('*');
                requests = r || [];
                const {data:m} = await db.from('matches').select('*');
                matches = m || [];
                renderView();
            } catch(e) { console.error(e); }
        }

        function showView(v) {
            window.currentView = v;
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('bg-white/10', 'text-white'));
            const el = document.getElementById('nav-'+v);
            if(el) el.classList.add('bg-white/10', 'text-white');
            renderView();
        }

        function renderView() {
            const c = document.getElementById('content-view');
            c.innerHTML = '';
            if(window.currentView === 'dashboard') renderDashboard(c);
            else if(window.currentView === 'physicians') renderPhysicians(c);
            else if(window.currentView === 'ppipeline') renderPipeline(c, providers);
            else if(window.currentView === 'clients') renderClients(c);
            else if(window.currentView === 'cpipeline') renderPipeline(c, clients, 'Client Pipeline');
            else if(window.currentView === 'matching') renderMatching(c);
            else if(window.currentView === 'activity') renderActivity(c);
            else c.innerHTML = '<div class="p-20 text-center text-white/20 font-bold uppercase tracking-widest text-4xl">Module Ready</div>';
            if(window.lucide) lucide.createIcons();
        }

        function renderDashboard(c) {
            c.innerHTML = `
                <div class="grid grid-cols-4 gap-6 mb-10 animate-in">
                    <div class="glass p-8 rounded-3xl"><p class="text-slate-500 text-[10px] font-bold uppercase mb-2">Providers</p><h3 class="text-4xl font-bold">${providers.length}</h3></div>
                    <div class="glass p-8 rounded-3xl"><p class="text-slate-500 text-[10px] font-bold uppercase mb-2">Active Clients</p><h3 class="text-4xl font-bold text-amber-400">${clients.length}</h3></div>
                    <div class="glass p-8 rounded-3xl"><p class="text-slate-500 text-[10px] font-bold uppercase mb-2">Open Requests</p><h3 class="text-4xl font-bold text-teal-400">${requests.length}</h3></div>
                    <div class="glass p-8 rounded-3xl"><p class="text-slate-500 text-[10px] font-bold uppercase mb-2">Matches</p><h3 class="text-4xl font-bold text-cyan-400">${matches.length}</h3></div>
                </div>
                <div class="glass p-10 rounded-3xl text-center">
                    <h2 class="text-xl font-bold mb-4 text-cyan-400">System Takeover v4.2 Active</h2>
                    <p class="text-slate-400 max-w-2xl mx-auto">Database tables synchronized. Ready for data ingestion for 200+ employees.</p>
                </div>
            `;
        }

        function renderPhysicians(c) {
            c.innerHTML = \`<div class="glass rounded-3xl overflow-hidden animate-in"><table class="w-full text-left"><tr class="bg-white/5 border-b border-white/5"><th class="p-6 text-[10px] font-bold uppercase text-slate-500">Name</th><th class="p-6 text-[10px] font-bold uppercase text-slate-500">Specialty</th><th class="p-6 text-[10px] font-bold uppercase text-slate-500">Status</th></tr> \${providers.map(p => \`<tr class="border-b border-white/5 hover:bg-white/5"><td class="p-6 font-bold">\${p.name}</td><td class="p-6">\${p.specialty}</td><td class="p-6"><span class="status-badge bg-blue-500/20 text-blue-400">\${p.status}</span></td></tr>\`).join('')} </table></div>\`;
        }

        function renderClients(c) {
            c.innerHTML = \`<div class="glass rounded-3xl overflow-hidden animate-in"><table class="w-full text-left"><tr class="bg-white/5 border-b border-white/5"><th class="p-6 text-[10px] font-bold uppercase text-slate-500">Account Name</th><th class="p-6 text-[10px] font-bold uppercase text-slate-500">Location</th><th class="p-6 text-[10px] font-bold uppercase text-slate-500">Status</th></tr> \${clients.map(cl => \`<tr class="border-b border-white/5 hover:bg-white/5"><td class="p-6 font-bold">\${cl.name}</td><td class="p-6">\${cl.location}</td><td class="p-6"><span class="status-badge bg-amber-500/20 text-amber-400">\${cl.status}</span></td></tr>\`).join('')} </table></div>\`;
        }

        function renderPipeline(c, data, title = 'Pipeline') {
            const stages = ['Prospect', 'Recruiting', 'Pending', 'Active'];
            c.innerHTML = \`<h2 class="text-xl font-bold mb-6">\${title}</h2><div class="grid grid-cols-4 gap-6 h-full animate-in"> \${stages.map(s => \`<div class="flex flex-col gap-4"><p class="text-[10px] font-bold text-white/40 uppercase">\${s}</p><div class="min-h-[400px] bg-white/5 rounded-2xl p-4 space-y-4"> \${data.filter(x => x.status === s).map(x => \`<div class="glass p-4 rounded-xl text-xs font-bold">\${x.name}</div>\`).join('')} </div></div>\`).join('')} </div>\`;
        }

        function renderMatching(c) {
            c.innerHTML = \`<div class="glass p-10 rounded-[2rem] text-center animate-in"><i data-lucide="zap" class="w-12 h-12 text-teal-400 mx-auto mb-6"></i><h2 class="text-2xl font-bold mb-2">Matching Engine</h2><p class="text-slate-500">Analyze client requests against provider credentials and availability.</p></div>\`;
        }

        function renderActivity(c) {
            c.innerHTML = \`<h2 class="text-xl font-bold mb-6">Activity Log</h2><div class="glass rounded-3xl p-6 space-y-4 animate-in"> <div class="flex gap-4 items-center p-4 bg-white/5 rounded-2xl border-l-4 border-cyan-500"><div class="bg-cyan-500/20 p-3 rounded-full"><i data-lucide="refresh-cw" class="w-4 h-4 text-cyan-400"></i></div><div><p class="text-sm font-bold">System Upgrade to v4.2</p><p class="text-[10px] text-slate-500 uppercase">Just Now • System</p></div></div> </div>\`;
        }

        function openModal(type) {
            const m = document.getElementById('modal-container');
            const t = document.getElementById('modal-title');
            const b = document.getElementById('modal-body');
            m.classList.remove('hidden');
            if(type === 'provider') {
                t.innerText = 'Add New Physician';
                b.innerHTML = \`<input id="p-name" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm"><input id="p-spec" placeholder="Specialty" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm"><button onclick="saveProvider()" class="w-full bg-cyan-600 py-3 rounded-xl font-bold">Save Provider</button>\`;
            } else {
                t.innerText = 'Add New Client Account';
                b.innerHTML = \`<input id="c-name" placeholder="Facility Name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm"><input id="c-loc" placeholder="Location" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm"><button onclick="saveClient()" class="w-full bg-amber-600 py-3 rounded-xl font-bold">Save Client</button>\`;
            }
            if(window.lucide) lucide.createIcons();
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        async function saveProvider() {
            const name = document.getElementById('p-name').value;
            const specialty = document.getElementById('p-spec').value;
            if(!db) return;
            await db.from('providers').insert([{name, specialty, status: 'Active'}]);
            closeModal();
            refreshData();
        }

        async function saveClient() {
            const name = document.getElementById('c-name').value;
            const location = document.getElementById('c-loc').value;
            if(!db) return;
            await db.from('clients').insert([{name, location, status: 'Active'}]);
            closeModal();
            refreshData();
        }

        window.onload = init;
    </script>
</body>
</html>
